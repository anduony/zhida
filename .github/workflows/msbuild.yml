name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # 可选：仅在创建 tag 时发布
  # push:
  #   tags:
  #     - 'v*'

env:
  PROJECT_FILE_PATH: 直达/直达.vcxproj
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v5

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $vswherePath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $msbuildPath = & $vswherePath -latest -products * -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
        Write-Host "MSBuild Path: $msbuildPath"
        $projectPath = Join-Path -Path $env:GITHUB_WORKSPACE -ChildPath "${{env.PROJECT_FILE_PATH}}"
        Write-Host "Project Path: $projectPath"
        & "$msbuildPath" /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:Platform=x64 "$projectPath"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zhida-release
        path: 直达/bin/Release/x64/直达.exe

    # 添加自动发布到 Releases
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          自动构建发布
          - 构建编号: ${{ github.run_number }}
          - 提交: ${{ github.sha }}
        files: |
          直达/bin/Release/x64/直达.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
