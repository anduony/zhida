# separate terms of service, privacy policy, and support
# documentation.

name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Path to the project file
  PROJECT_FILE_PATH: 直达/直达.vcxproj

  # Configuration type to build.
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      shell: cmd
      run: |
        chcp 65001
        for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -find "MSBuild\**\Bin\MSBuild.exe"`) do (
          set "msbuildPath=%%i"
          goto :found
        )
        :found
        "%msbuildPath%" /m /p:Configuration=%BUILD_CONFIGURATION% /p:Platform=x64 "%GITHUB_WORKSPACE%\%PROJECT_FILE_PATH%"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zhida-release
        path: bin/Release/x64/直达.exe
